<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | The Kandyan Villa</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green: #1f4e3d;
            --green2: #2d6a52;
            --gold: #d4af37;
            --dark: #1a1a1a;
            --bg: #faf9f6;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--dark);
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(135deg, #0d2b22 0%, #1a1a1a 50%, #1e3d2f 100%);
        }

        .bg-shapes {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08), transparent 70%);
            animation: pulsate 8s ease-in-out infinite;
        }

        .shape:nth-child(1) {
            width: 600px;
            height: 600px;
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -100px;
            animation-delay: 3s;
            background: radial-gradient(circle, rgba(31, 78, 61, 0.2), transparent 70%);
        }

        .shape:nth-child(3) {
            width: 300px;
            height: 300px;
            top: 50%;
            right: 20%;
            animation-delay: 5s;
        }

        @keyframes pulsate {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        /* Grid dots */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Card */
        .login-card {
            position: relative;
            z-index: 10;
            width: 440px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px 44px;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            animation: slideUp 0.6s ease forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--green), var(--green2));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 8px 24px rgba(31, 78, 61, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .brand-icon i {
            font-size: 28px;
            color: var(--gold);
        }

        .brand h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 4px;
        }

        .brand p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.82rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* Badge */
        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(212, 175, 55, 0.12);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--gold);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 4px 14px;
            border-radius: 100px;
            margin: 0 auto 28px;
            display: flex;
            width: fit-content;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
            pointer-events: none;
            transition: color 0.2s;
        }

        .input-wrap input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 44px 14px 44px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .input-wrap input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .input-wrap input:focus {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-wrap input:focus+i,
        .input-wrap:focus-within i {
            color: var(--gold);
        }

        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            padding: 4px;
            background: none;
            border: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .toggle-pw:hover {
            color: var(--gold);
        }

        .error-msg {
            display: none;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 18px;
            align-items: center;
            gap: 8px;
        }

        .error-msg.show {
            display: flex;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--green), var(--green2));
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(31, 78, 61, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--gold), #e8c867);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-login:hover::before {
            opacity: 0.15;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(31, 78, 61, 0.5);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login span,
        .btn-login i {
            position: relative;
            z-index: 1;
        }

        .btn-login.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .footer-note {
            text-align: center;
            margin-top: 28px;
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.75rem;
        }

        .footer-note a {
            color: var(--gold);
            text-decoration: none;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }

        /* Attempts warning */
        .attempts-warning {
            text-align: center;
            margin-top: 12px;
            font-size: 0.78rem;
            color: rgba(255, 100, 100, 0.8);
            display: none;
        }

        /* Lock overlay */
        .lock-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.92);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #fff;
            text-align: center;
        }

        .lock-overlay.show {
            display: flex;
        }

        .lock-overlay i {
            font-size: 4rem;
            color: #ef4444;
            margin-bottom: 20px;
        }

        .lock-overlay h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .lock-overlay p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            .login-card {
                width: 94vw;
                padding: 36px 28px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-layer"></div>
    <div class="bg-grid"></div>
    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <!-- Lock overlay after too many attempts -->
    <div class="lock-overlay" id="lockOverlay">
        <i class="fa-solid fa-lock"></i>
        <h2>Account Locked</h2>
        <p id="lockMsg">Too many failed attempts. Please wait before trying again.</p>
    </div>

    <div class="login-card">
        <div class="brand">
            <div class="brand-icon">
                <i class="fa-solid fa-hotel"></i>
            </div>
            <h1>The Kandyan Villa</h1>
            <p>Management Portal</p>
        </div>

        <div class="admin-badge">
            <i class="fa-solid fa-shield-halved"></i>
            Admin Access Only
        </div>

        <div class="error-msg" id="errorMsg">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="errorText">Invalid username or password.</span>
        </div>

        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" name="username" placeholder="Enter admin username"
                        autocomplete="off" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Enter password"
                        autocomplete="current-password" required>
                    <button type="button" class="toggle-pw" id="togglePw" tabindex="-1">
                        <i class="fa-solid fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <p class="attempts-warning" id="attemptsWarning"></p>

            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fa-solid fa-right-to-bracket"></i>
                <span>Sign In to Dashboard</span>
            </button>
        </form>

        <div class="footer-note">
            <a href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to Website</a>
        </div>
    </div>

    <!-- Core Admin Logic -->
    <script src="js/admin.js"></script>

    <script>
        // Use a function to ensure KVAdmin is available
        function handleLogin(e) {
            e.preventDefault();
            console.log("Login attempt started...");

            if (!window.KVAdmin) {
                console.error("Critical Error: KVAdmin (admin.js) not loaded!");
                alert("Critical System Error: Admin scripts failed to load. Please refresh the page (Ctrl + F5).");
                return;
            }

            const { createSession, logActivity } = window.KVAdmin;
            const userField = document.getElementById('username');
            const passField = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            const username = userField.value.trim();
            const password = passField.value;

            console.log("Checking credentials for:", username);

            // Correct credentials
            const ADMIN_USER = 'admin';
            const ADMIN_PASS = 'KandyanVilla@2024';

            if (username === ADMIN_USER && password === ADMIN_PASS) {
                console.log("Authentication successful!");

                // Show success on button
                loginBtn.style.background = '#16a34a';
                loginBtn.querySelector('span').textContent = 'Welcome! Redirecting...';

                // Save session
                createSession();
                logActivity('Login', 'Admin logged in successfully');

                // Redirect
                setTimeout(function () {
                    window.location.href = 'dashboard.html';
                }, 500);
            } else {
                console.warn("Authentication failed: Invalid username or password.");
                errorMsg.classList.add('show');
                passField.value = '';
                passField.focus();
                alert("Invalid username or password. Please try again.");
            }
        }

        // Attach event listener
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('loginForm');
            if (form) {
                form.addEventListener('submit', handleLogin);
                console.log("Login form initialized");
            }

            // Check if already logged in
            if (window.KVAdmin && window.KVAdmin.getSession()) {
                console.log("Existing session found, redirecting...");
                window.location.href = 'dashboard.html';
            }
        });

        // Toggle Password visibility
        document.getElementById('togglePw').addEventListener('click', function () {
            const pw = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            pw.type = pw.type === 'password' ? 'text' : 'password';
            icon.className = pw.type === 'password' ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
        });
    </script>
</body>

</html>
